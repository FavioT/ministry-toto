<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Monitor body -->
  <rect x="1" y="2" width="30" height="22" rx="3" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
  <!-- Title bar (macOS Classic black) -->
  <rect x="1" y="2" width="30" height="7" rx="3" fill="#1a1a1a"/>
  <rect x="1" y="6" width="30" height="3" fill="#1a1a1a"/>
  <!-- Close button (mac classic square) -->
  <rect x="4" y="4" width="4" height="4" rx="1" fill="#e8e8e8" stroke="#888" stroke-width="0.5"/>
  <!-- Screen -->
  <rect x="3" y="11" width="26" height="11" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
  <!-- Code lines -->
  <rect x="5" y="13" width="10" height="1.5" rx="0.5" fill="#333"/>
  <rect x="5" y="16" width="16" height="1.5" rx="0.5" fill="#666"/>
  <rect x="5" y="19" width="12" height="1.5" rx="0.5" fill="#666"/>
  <!-- Stand -->
  <rect x="14" y="24" width="4" height="4" fill="#ccc" stroke="#aaa" stroke-width="0.5"/>
  <rect x="10" y="28" width="12" height="2" rx="1" fill="#ccc" stroke="#aaa" stroke-width="0.5"/>
</svg>

