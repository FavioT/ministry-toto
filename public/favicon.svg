<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Monitor -->
  <rect x="2" y="2" width="28" height="22" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="2" y="2" width="28" height="6" rx="2" fill="#000080"/>
  <rect x="2" y="6" width="28" height="2" fill="#000080"/>
  <!-- Screen -->
  <rect x="4" y="10" width="24" height="12" fill="#008080"/>
  <!-- Code lines -->
  <rect x="6" y="13" width="8" height="1.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="8" y="16" width="14" height="1.5" rx="0.5" fill="#ffff00" opacity="0.9"/>
  <rect x="8" y="19" width="10" height="1.5" rx="0.5" fill="#ffff00" opacity="0.8"/>
  <!-- Stand -->
  <rect x="14" y="24" width="4" height="4" fill="#c0c0c0"/>
  <rect x="10" y="28" width="12" height="2" rx="1" fill="#c0c0c0" stroke="#808080" stroke-width="0.5"/>
</svg>

