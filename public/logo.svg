<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Monitor body -->
  <rect x="10" y="10" width="100" height="72" rx="3" fill="#c0c0c0" stroke="#808080" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="10" y="10" width="100" height="18" rx="3" fill="#000080"/>
  <rect x="10" y="22" width="100" height="6" fill="#000080"/>
  <!-- Title bar text dots -->
  <circle cx="26" cy="19" r="3" fill="white" opacity="0.8"/>
  <circle cx="36" cy="19" r="3" fill="white" opacity="0.8"/>
  <circle cx="46" cy="19" r="3" fill="white" opacity="0.8"/>
  <!-- Close/min/max buttons -->
  <rect x="88" y="13" width="8" height="10" rx="1" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="98" y="13" width="8" height="10" rx="1" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <!-- Screen area -->
  <rect x="18" y="32" width="84" height="44" fill="#008080"/>
  <!-- Code lines on screen -->
  <rect x="24" y="40" width="30" height="3" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="28" y="47" width="48" height="3" rx="1" fill="#ffff00" opacity="0.8"/>
  <rect x="28" y="54" width="36" height="3" rx="1" fill="#ffff00" opacity="0.8"/>
  <rect x="24" y="61" width="20" height="3" rx="1" fill="#ffffff" opacity="0.9"/>
  <!-- Cursor blink -->
  <rect x="45" y="61" width="6" height="3" rx="1" fill="#00ff00" opacity="0.9"/>
  <!-- Stand neck -->
  <rect x="52" y="82" width="16" height="12" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <!-- Stand base -->
  <rect x="38" y="94" width="44" height="8" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1.5"/>
  <!-- 3D border effect top-left -->
  <line x1="10" y1="82" x2="10" y2="10" stroke="white" stroke-width="2"/>
  <line x1="10" y1="10" x2="110" y2="10" stroke="white" stroke-width="2"/>
  <!-- 3D border effect bottom-right -->
  <line x1="110" y1="10" x2="110" y2="82" stroke="#404040" stroke-width="2"/>
  <line x1="10" y1="82" x2="110" y2="82" stroke="#404040" stroke-width="2"/>
</svg>

