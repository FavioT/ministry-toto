<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Monitor body -->
  <rect x="8" y="8" width="104" height="76" rx="6" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <!-- Title bar (macOS Classic black) -->
  <rect x="8" y="8" width="104" height="20" rx="6" fill="#1a1a1a"/>
  <rect x="8" y="20" width="104" height="8" fill="#1a1a1a"/>
  <!-- Close / minimize / zoom buttons (mac classic squares) -->
  <rect x="14" y="12" width="10" height="10" rx="2" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <rect x="28" y="12" width="10" height="10" rx="2" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <rect x="42" y="12" width="10" height="10" rx="2" fill="#e8e8e8" stroke="#888" stroke-width="1"/>
  <!-- Window title (centered) -->
  <text x="60" y="20" font-family="Geneva, sans-serif" font-size="7" fill="#fff" text-anchor="middle" letter-spacing="0.5">portfolio.app</text>
  <!-- Screen area (white bg like mac classic) -->
  <rect x="16" y="32" width="88" height="46" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <!-- Code lines on screen -->
  <rect x="22" y="40" width="28" height="3" rx="1" fill="#1a1a1a"/>
  <rect x="26" y="47" width="44" height="3" rx="1" fill="#555"/>
  <rect x="26" y="54" width="32" height="3" rx="1" fill="#555"/>
  <rect x="22" y="61" width="18" height="3" rx="1" fill="#1a1a1a"/>
  <!-- Cursor blink -->
  <rect x="42" y="61" width="5" height="3" rx="0.5" fill="#333"/>
  <!-- Stand neck -->
  <rect x="52" y="84" width="16" height="12" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>
  <!-- Stand base -->
  <rect x="36" y="96" width="48" height="8" rx="3" fill="#d0d0d0" stroke="#aaa" stroke-width="1.5"/>
</svg>

